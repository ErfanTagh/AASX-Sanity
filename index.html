<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AAS SANITY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand text-info">AAS aads</span>
  </nav>

  <!-- Toast Container -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body">
          <i class="bi bi-check-circle-fill me-2"></i>
          <strong>Success!</strong> File processed successfully and ready for download.
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner">
      <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="loading-text mt-3">
        <h5 class="text-light">Processing...</h5>
        <p class="text-muted" id="loadingMessage">Applying rule changes</p>
      </div>
    </div>
  </div>

  <!-- Main Container -->
  <div class="container-fluid">
    <div class="row">
           <!-- Navigation Tabs -->
    <ul class="nav nav-tabs px-4 pt-3" id="mainTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="shells-tab" data-bs-toggle="tab" data-bs-target="#shells" type="button" role="tab" aria-controls="shells" aria-selected="true">
          <i class="bi bi-collection me-2"></i>Error handling at once
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="validation-tab" data-bs-toggle="tab" data-bs-target="#validation" type="button" role="tab" aria-controls="validation" aria-selected="false">
          <i class="bi bi-shield-check me-2"></i>Rule Validation
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="changes-results-tab" data-bs-toggle="tab" data-bs-target="#changes-results" type="button" role="tab" aria-controls="changes-results" aria-selected="false">
          <i class="bi bi-file-diff me-2"></i>Changes & as
        </button>
      </li>
    </ul>
      
      <!-- Main Content Tabs (Shells / Rule Validation) -->
      <div class="col-md-9 p-4">
        <div class="tab-content">
          <div class="tab-pane fade show active shell-wrapper" id="shells" aria-labelledby="shells-tab" role="tabpanel">

          </div>
          <div class="tab-pane fade code-wrapper" id="validation" aria-labelledby="validation-tab" role="tabpanel">

          </div>
          <div class="tab-pane fade changes-results-wrapper" id="changes-results" aria-labelledby="changes-results-tab" role="tabpanel">

          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="col-md-3 p-4 sidebar">
        <div class="d-grid gap-3">
          <button class="btn btn-cyan" onclick="reloadAll()">🔄 Clear the YX</button>

          
            <!-- Hidden file input -->
            <input type="file" id="jsonFileInput" accept=".json" style="display: none;">

            <!-- Load More Button triggers file input -->
            <button class="btn btn-primary" onclick="document.getElementById('jsonFileInput').click()">Load more...</button>
        </div>
      </div>

    </div>
  </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
