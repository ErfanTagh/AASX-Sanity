name: Deploy to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            echo "Pulling latest changes..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            echo "Building Docker images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
            echo "Restarting containers..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            echo "Restoring jsonsanitypro.de nginx vhost (reverse proxy lives in resume_nginx, not in this repo's Docker)..."
            if [ -f jsonsanitypro.conf ]; then
              cp jsonsanitypro.conf /root/my-simple-resume/nginx/conf.d/00-jsonsanitypro.conf
              docker exec resume_nginx nginx -t
              docker exec resume_nginx nginx -s reload
              echo "Nginx reloaded for jsonsanitypro.de"
            else
              echo "WARNING: jsonsanitypro.conf missing in repo clone"
            fi
            echo "Deploy complete. Website updated."
