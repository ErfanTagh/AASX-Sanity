# Production overrides for jsonsanitypro.de deployment
# Used with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Frontend on 8080 (port 80 is used by nginx); nginx proxies to aas-frontend:80
# Backend/frontend on resume-network so nginx can reach them

services:
  backend:
    ports:
      - "5001:5001"
    networks:
      - aas-network
      - resume-network

  frontend:
    networks:
      - aas-network
      - resume-network

networks:
  aas-network:
    driver: bridge
  resume-network:
    external: true
    name: my-simple-resume_resume-network
