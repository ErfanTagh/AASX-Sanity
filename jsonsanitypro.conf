# JSON Sanity Pro - jsonsanitypro.de
# HTTP: allow certbot, redirect rest to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jsonsanitypro.de www.jsonsanitypro.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - serve app for both root and www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jsonsanitypro.de www.jsonsanitypro.de;

    ssl_certificate /etc/letsencrypt/live/jsonsanitypro.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jsonsanitypro.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /api/ {
        proxy_pass http://aas-backend:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://aas-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
