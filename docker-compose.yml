services:
  backend:
    build:
      context: ./cpp-project/BackendCpp
      dockerfile: Dockerfile
    container_name: aas-backend
    ports:
      - "5001:5001"
    environment:
      - SERVER_PORT=5001
    networks:
      - aas-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aas-frontend
    ports:
      - "8080:80"  # 8080 to avoid conflict with nginx; prod uses same
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./script.js:/usr/share/nginx/html/script.js
      - ./styles.css:/usr/share/nginx/html/styles.css
      - ./bootstrap-5.0.2-dist:/usr/share/nginx/html/bootstrap-5.0.2-dist
    depends_on:
      - backend
    networks:
      - aas-network
    restart: unless-stopped

networks:
  aas-network:
    driver: bridge

volumes:
  backend-data:
