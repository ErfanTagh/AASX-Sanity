version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: aas-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Backend:/app
    networks:
      - aas-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aas-frontend
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./script.js:/usr/share/nginx/html/script.js
      - ./styles.css:/usr/share/nginx/html/styles.css
      - ./bootstrap-5.0.2-dist:/usr/share/nginx/html/bootstrap-5.0.2-dist
    depends_on:
      - backend
    networks:
      - aas-network
    restart: unless-stopped

networks:
  aas-network:
    driver: bridge

volumes:
  backend-data:
